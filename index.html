<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE SYSTEM</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils"></script>
</head>
<body class="rank-E system-normal">

    <div class="grid-layer"></div>

    <div id="init-screen" class="full-overlay">
        <div class="window anime-glow">
            <div class="window-header"><span>!</span> NOTIFICATION</div>
            <div class="window-body">
                <p>You have acquired the qualifications to be a <span class="blue-tint">Player</span>. Will you accept?</p>
            </div>
            <div class="window-footer">
                <button class="btn-sys" onclick="initializeSystem()">YES</button>
                <button class="btn-sys disabled">NO</button>
            </div>
        </div>
    </div>

    <div id="game-ui" style="display: none;">
        <div class="camera-bg">
            <video id="webcam" autoplay playsinline></video>
            <div id="penalty-overlay" class="penalty-flash"></div>
        </div>

        <div class="status-box anime-glow">
            <div class="bars">
                <div class="bar-wrap">
                    <span class="tag">HP</span>
                    <div class="outer"><div id="hp-fill" class="inner hp-color"></div></div>
                </div>
                <div class="bar-wrap">
                    <span class="tag">MP</span>
                    <div class="outer"><div id="mp-fill" class="inner mp-color"></div></div>
                </div>
            </div>
            <div class="fatigue-stat">
                <div class="f-label">FATIGUE</div>
                <div id="fatigue-val" class="f-num">0</div>
            </div>
        </div>

        <div class="stats-grid anime-glow">
            <div class="s-item">STR: <span id="stat-str">10</span> <button onclick="addStat('str')">+</button></div>
            <div class="s-item">VIT: <span id="stat-vit">10</span> <button onclick="addStat('vit')">+</button></div>
            <div class="s-item">AGI: <span id="stat-agi">10</span> <button onclick="addStat('agi')">+</button></div>
            <div class="s-item highlight">AP: <span id="stat-ap">0</span></div>
        </div>

        <div class="quest-info">
            <div class="q-title">DAILY QUEST: PREPARING TO BECOME STRONG</div>
            <div class="q-progress">Push-ups: <span id="rep-count">0</span> / 100</div>
            <div id="timer" class="q-timer">00:00:00</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
